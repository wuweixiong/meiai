server:
  port: 0

spring:
  datasource:
    url: jdbc:h2:mem:xindongriji;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    database-platform: org.hibernate.dialect.H2Dialect

jwt:
  secret: test-secret-xindongriji-backend-32bytes-minimum
  access-token-expire-seconds: 7200
